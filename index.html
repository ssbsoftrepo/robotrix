<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROBOTRIX+ CPAK Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Condensed:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Roboto Condensed', sans-serif;
    }

    .gemini-dark {
      background-color: #131314;
      color: #e3e3e3;
    }

    .gemini-dark-card {
      background-color: #1e1f20;
    }

    .gemini-dark-input {
      background-color: #2a2b2c;
      border-color: #5f6368;
      color: #e3e3e3;
    }

    .gemini-dark-input:focus {
      outline: none;
      box-shadow: none;
      border-color: #893338;
    }

    .gemini-dark-button {
      background-color: #6D282C;
      color: white;
    }

    .gemini-dark-button:hover:not(:disabled) {
      background-color: #893338;
    }

    .gemini-dark-button:disabled {
      background-color: #4a2527;
      cursor: not-allowed;
    }

    .text-dark-maroon {
      color: #6D282C;
    }

    /* Ensure print styles are clean */
    @media print {

      body,
      #root,
      main,
      .overflow-y-auto {
        background-color: white !important;
        color: black !important;
        overflow: visible !important;
        height: auto !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .gemini-dark-card,
      .step-card {
        background-color: white !important;
        color: black !important;
        border: 1px solid #ccc !important;
        box-shadow: none !important;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      /* Inner cards adjustments */
      .bg-gray-800\/50,
      .bg-black\/30 {
        background-color: #f9fafb !important;
        /* light gray for inner cards */
        border: 1px solid #ddd !important;
        color: black !important;
      }

      /* Text color overrides for print readability */
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .text-gray-100,
      .text-gray-200,
      .text-gray-300,
      .text-gray-400,
      .text-gray-500,
      .text-white,
      .text-cyan-300 {
        color: black !important;
      }

      .text-yellow-400,
      .text-yellow-500 {
        color: #b45309 !important;
        /* Dark orange for contrast */
      }

      .print-break-inside-avoid {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      .print-grid-2 {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 1rem !important;
        /* Compact gap */
        width: 100% !important;
      }

      .print-break-before {
        break-before: page;
        page-break-before: always;
      }

      .print-text-black {
        color: black !important;
      }

      .print-image-container {
        height: 300px !important;
        /* Match compact design */
        max-height: 300px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        background-color: black !important;
        /* Keep black for X-rays */
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        page-break-inside: avoid !important;
        border: 1px solid #000 !important;
      }

      .print-image-container img {
        max-height: 100% !important;
        max-width: 100% !important;
        width: auto !important;
        height: auto !important;
        object-fit: contain !important;
      }

      nav,
      header,
      button,
      .gemini-dark-button,
      .sidebar-icon,
      #print-report-btn,
      .no-print {
        display: none !important;
      }

      #report-content {
        box-shadow: none !important;
        border: none !important;
        padding: 0 !important;
      }

      section {
        page-break-inside: avoid;
      }

      /* Fix for specific inner container backgrounds that might be missing */
      .bg-white\/5 {
        background-color: transparent !important;
        border-color: #eee !important;
      }

      .print-badge {
        color: white !important;
        background-color: black !important;
        border: 1px solid white !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.1"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="gemini-dark">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
