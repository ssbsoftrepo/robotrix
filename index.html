
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROBOTRIX+ CPAK Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Roboto', sans-serif;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Roboto Condensed', sans-serif;
      }
      .gemini-dark {
          background-color: #131314;
          color: #e3e3e3;
      }
      .gemini-dark-card {
          background-color: #1e1f20;
      }
      .gemini-dark-input {
          background-color: #2a2b2c;
          border-color: #5f6368;
          color: #e3e3e3;
      }
       .gemini-dark-input:focus {
          outline: none;
          box-shadow: none;
          border-color: #893338;
      }
      .gemini-dark-button {
           background-color: #6D282C;
           color: white;
      }
      .gemini-dark-button:hover:not(:disabled) {
          background-color: #893338;
      }
      .gemini-dark-button:disabled {
          background-color: #4a2527;
          cursor: not-allowed;
      }
      .text-dark-maroon {
          color: #6D282C;
      }
      /* Ensure print styles are clean */
      @media print {
        body, #root {
          background-color: white !important;
          color: black !important;
        }
        .gemini-dark-card, .step-card {
           background-color: #f3f4f6 !important;
           color: black !important;
           border-color: #ccc !important;
        }
        h1, h2, h3, h4, .text-gray-200, .text-gray-100, .text-gray-300, .text-gray-400 {
            color: black !important;
        }
        .text-yellow-400, .text-yellow-500 {
            color: #b45309 !important;
        }
        nav, header, button, .gemini-dark-button, .sidebar-icon, #print-report-btn, .no-print {
          display: none !important;
        }
        #report-content {
          box-shadow: none !important;
          border: none !important;
          padding: 0 !important;
        }
        #report-content section img {
            max-width: 350px !important;
            height: auto !important;
            margin: 0 auto !important;
        }
        section {
            page-break-inside: avoid;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="gemini-dark">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
